# Hundtracker Backend - Docker Compose
# Run: docker-compose up -d
# API: http://localhost:8000
# Docs: http://localhost:8000/docs

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Dev only: /debug/mqtt — set ENABLE_MQTT_DEBUG_PAGE=false before production
      - ENABLE_MQTT_DEBUG_PAGE=${ENABLE_MQTT_DEBUG_PAGE:-true}
      - DATABASE_URL=postgresql+asyncpg://tracker:tracker@db:5432/tracker
      - MQTT_HOST=${MQTT_HOST:-mqtt.chickendinner.vip}
      - MQTT_PORT=${MQTT_PORT:-8883}
      - MQTT_USERNAME=${MQTT_USERNAME:-trackerbackend}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./app:/app/app  # Dev hot-reload (comment out for prod)

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: tracker
      # No POSTGRES_DB: default DB name = POSTGRES_USER (= tracker)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
